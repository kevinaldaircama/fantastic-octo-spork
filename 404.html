<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>403 - Acceso Prohibido</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(
135deg,
#0d1117,
#161b22
);

color:white;
overflow:hidden;

}

.container{

text-align:center;
padding:30px;

}

.icon{

font-size:90px;
margin-bottom:20px;
animation:shake 2s infinite;

}

.code{

font-size:100px;
font-weight:bold;
background:linear-gradient(
90deg,
#ff4d4d,
#ff9900
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

h2{

margin:10px 0;

}

p{

opacity:.8;
max-width:500px;
margin:auto;
line-height:25px;

}

.buttons{

margin-top:30px;

}

.btn{

display:inline-block;
padding:14px 25px;
margin:10px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
transition:.4s;

}

.home{

background:#2575fc;
color:white;

}

.back{

border:1px solid white;
color:white;

}

.btn:hover{

transform:translateY(-5px);

}

@keyframes shake{

0%{
transform:rotate(0deg);
}

25%{
transform:rotate(-10deg);
}

50%{
transform:rotate(10deg);
}

100%{
transform:rotate(0deg);
}

}

.particles{

position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;

}

.circle{

position:absolute;
width:10px;
height:10px;
background:white;
border-radius:50%;
opacity:.2;
animation:move 15s linear infinite;

}

@keyframes move{

0%{

transform:translateY(100vh);

}

100%{

transform:translateY(-100px);

}

}

</style>
</head>
<body>

<div class="particles"></div>

<div class="container">

<div class="icon">

<i class="fa-solid fa-lock"></i>

</div>

<div class="code">

403

</div>

<h2>

Acceso Prohibido

</h2>

<p>

No tienes permisos para acceder a esta página o recurso. Verifica tus credenciales o vuelve al inicio.

</p>

<div class="buttons">

<a href="index.html"
class="btn home">

<i class="fa fa-home"></i>

Ir al inicio

</a>

<a href="#"
onclick="history.back()"
class="btn back">

<i class="fa fa-arrow-left"></i>

Regresar

</a>

</div>

</div>


<script>

let particles=
document.querySelector(".particles");

for(let i=0;i<40;i++){

let circle=
document.createElement("div");

circle.classList.add(
"circle"
);

circle.style.left=
Math.random()*100+"%";

circle.style.animationDuration=
(Math.random()*10+5)+"s";

circle.style.opacity=
Math.random();

particles.appendChild(
circle
);

}

</script>

</body>
</html>
